<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<meta name="description" content="Portfolio site.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="blob-field">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="grain"></div>

<nav class="nav glass">
  <a href="#top" class="nav-logo"><span class="dot"></span><span id="navLogoText">Portfolio</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="#contact" class="nav-cta">Let's talk</a>
  <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
</nav>

<main id="top">
  <div id="app">
    <section class="hero" style="padding-top:140px;">
      <div class="hero-inner">
        <div>
          <img id="heroAvatar" class="hero-avatar" style="display:none;" alt="">
          <div class="eyebrow">PORTFOLIO / 2026</div>
          <h1 id="heroName"></h1>
          <div class="hero-role" id="heroRole"></div>
          <p class="hero-desc" id="heroDesc"></p>
          <div class="hero-actions">
            <a href="#projects" class="btn btn-primary">View projects →</a>
            <a href="#contact" class="btn btn-ghost">Get in touch</a>
          </div>
        </div>

        <div class="status-card glass">
          <div class="status-row">
            <span class="status-label">Status</span>
            <span class="status-value flex"><span class="pulse" id="statusPulse"></span><span id="statusText"></span></span>
          </div>
          <div class="status-divider"></div>
          <div class="status-row">
            <span class="status-label">Based in</span>
            <span class="status-value" id="statusLocation"></span>
          </div>
          <div class="status-row">
            <span class="status-label">Focus</span>
            <span class="status-value" id="statusFocus"></span>
          </div>
          <div class="status-divider"></div>
          <div class="status-bars" aria-hidden="true">
            <span style="height:40%"></span><span style="height:70%"></span><span style="height:55%"></span>
            <span style="height:90%"></span><span style="height:65%"></span><span style="height:80%"></span>
            <span style="height:45%"></span>
          </div>
        </div>
      </div>
    </section>

    <section id="about">
      <div class="section-head">
        <div class="eyebrow">ABOUT</div>
        <h2>A little about me</h2>
      </div>
      <div class="about-grid">
        <div class="about-text" id="aboutText"></div>
        <div class="stat-grid" id="statGrid"></div>
      </div>
    </section>

    <section id="skills">
      <div class="section-head">
        <div class="eyebrow">SKILLS</div>
        <h2>Tools I work with</h2>
      </div>
      <div class="skill-cloud" id="skillCloud"></div>
    </section>

    <section id="projects">
      <div class="section-head">
        <div class="eyebrow">PROJECTS</div>
        <h2>Selected work</h2>
      </div>
      <div class="bento" id="bento"></div>
    </section>

    <section id="contact">
      <div class="contact-card glass">
        <div class="eyebrow" style="justify-content:center;">CONTACT</div>
        <h2 id="contactHeading"></h2>
        <p id="contactDesc"></p>
        <div class="contact-links">
          <a href="#" id="contactEmail" class="btn btn-primary">Email me</a>
          <a href="#" id="contactGithub" class="btn btn-ghost" target="_blank" rel="noopener">GitHub</a>
          <a href="#" id="contactLinkedin" class="btn btn-ghost" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </section>
  </div>
</main>

<footer>
  © <span id="year"></span> <span id="footerName"></span> — built with glass and gradients.
</footer>

<script src="script.js"></script>
</body>
</html>
